# SPDX-License-Identifier: MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then echo "gofumpt would rewrite:"; echo "$diff"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: test (race)
        run: go test -race -count=1 -timeout=120s ./...
        env:
          CGO_ENABLED: "1"
      - name: build sanity
        run: |
          go build ./cmd/homeconnect2mqtt
          go build ./cmd/hc-util
