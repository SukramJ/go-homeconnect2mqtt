name: codeql

# CodeQL static analysis (SAST). Complements gosec/govulncheck with
# data-flow and taint analysis (injection, crypto misuse, …). Findings
# surface in the repository's Security → Code scanning tab; the job does
# not fail the build on alerts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1" # weekly Monday 03:23 UTC

permissions:
  contents: read
  security-events: write # required to upload CodeQL results

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  analyze:
    name: codeql (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          # Go's CodeQL extractor requires a real compile; autobuild runs
          # the module's `go build` (the internal/web/static embed dir is
          # committed, so a fresh checkout builds without extra setup).
          build-mode: autobuild
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
